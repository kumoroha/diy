<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作PC構成シミュレーター v2</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; border-bottom: 2px solid #007bff; display: inline-block; width: 100%; padding-bottom: 10px; }
        .part-section { margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; background: #fafafa; padding: 12px 15px; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; width: 150px; font-size: 0.95em; }
        select { flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; background-color: white; }
        .result-area { margin-top: 35px; padding: 25px; background: #f8f9ff; border-radius: 10px; border-left: 5px solid #007bff; }
        h3 { margin-top: 0; color: #007bff; }
        #summary-list { list-style: none; padding: 0; margin-bottom: 20px; }
        #summary-list li { padding: 8px 0; border-bottom: 1px dashed #d1d1d1; display: flex; justify-content: space-between; }
        .spec-label { color: #666; font-size: 0.85em; margin-left: 10px; }
        .btn-copy { display: block; width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-copy:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>PC構成シミュレーター</h1>

    <div id="selector-container">
        </div>

    <div class="result-area">
        <h3>最終構成確認</h3>
        <ul id="summary-list"></ul>
        <button class="btn-copy" onclick="copyToClipboard()">構成をクリップボードにコピー</button>
    </div>
</div>

<script>
    // パーツデータと指標数値
    const partsData = {
        "CPU": [
            { name: "Core i9-14900K", spec: "24C/32T, 最大6.0GHz" },
            { name: "Core i7-14700K", spec: "20C/28T, 最大5.6GHz" },
            { name: "Ryzen 9 7950X", spec: "16C/32T, 最大5.7GHz" },
            { name: "Ryzen 7 7800X3D", spec: "8C/16T, ゲーミング特化" },
            { name: "選択なし", spec: "" }
        ],
        "グラボ": [
            { name: "RTX 4090", spec: "24GB GDDR6X" },
            { name: "RTX 4080 Super", spec: "16GB GDDR6X" },
            { name: "RTX 4070 Ti Super", spec: "16GB GDDR6X" },
            { name: "RTX 4060", spec: "8GB GDDR6" },
            { name: "Radeon RX 7900 XTX", spec: "24GB GDDR6" },
            { name: "選択なし", spec: "" }
        ],
        "メモリ": [
            { name: "DDR5-6000 64GB", spec: "32GBx2" },
            { name: "DDR5-5600 32GB", spec: "16GBx2" },
            { name: "DDR4-3200 16GB", spec: "8GBx2" },
            { name: "選択なし", spec: "" }
        ],
        "SSD": [
            { name: "Gen4 NVMe 2TB", spec: "読込 7,000MB/s" },
            { name: "Gen4 NVMe 1TB", spec: "読込 5,000MB/s" },
            { name: "Gen3 NVMe 500GB", spec: "読込 3,500MB/s" },
            { name: "選択なし", spec: "" }
        ],
        "HDD": [
            { name: "8TB HDD", spec: "7200rpm, SATA" },
            { name: "4TB HDD", spec: "5400rpm, SATA" },
            { name: "2TB HDD", spec: "5400rpm, SATA" },
            { name: "選択なし", spec: "" }
        ],
        "OS": [
            { name: "Windows 11 Pro", spec: "64bit 日本語版" },
            { name: "Windows 11 Home", spec: "64bit 日本語版" },
            { name: "Linux (Ubuntu)", spec: "最新LTS" },
            { name: "選択なし", spec: "" }
        ],
        "電源": [
            { name: "1000W", spec: "80PLUS GOLD" },
            { name: "850W", spec: "80PLUS GOLD" },
            { name: "750W", spec: "80PLUS GOLD" },
            { name: "選択なし", spec: "" }
        ]
    };

    const container = document.getElementById('selector-container');
    const summaryList = document.getElementById('summary-list');

    // セレクトボックスの生成
    Object.keys(partsData).forEach(category => {
        const div = document.createElement('div');
        div.className = 'part-section';

        const label = document.createElement('label');
        label.innerText = category;

        const select = document.createElement('select');
        select.id = `select-${category}`;
        
        partsData[category].forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            // 選択肢に数値を表示
            option.text = item.spec ? `${item.name} (${item.spec})` : item.name;
            select.appendChild(option);
        });

        select.addEventListener('change', updateSummary);
        
        div.appendChild(label);
        div.appendChild(select);
        container.appendChild(div);
    });

    // 構成リストの更新
    function updateSummary() {
        summaryList.innerHTML = '';
        let hasSelection = false;

        Object.keys(partsData).forEach(category => {
            const selectedName = document.getElementById(`select-${category}`).value;
            const categoryData = partsData[category].find(p => p.name === selectedName);

            if (selectedName !== "選択なし") {
                const li = document.createElement('li');
                li.innerHTML = `<span><strong>${category}:</strong> ${selectedName}</span> <span class="spec-label">${categoryData.spec}</span>`;
                summaryList.appendChild(li);
                hasSelection = true;
            }
        });

        if (!hasSelection) {
            summaryList.innerHTML = '<li>パーツを選択してください</li>';
        }
    }

    // コピー機能
    function copyToClipboard() {
        let text = "【PC構成リスト】\n";
        const items = Array.from(summaryList.querySelectorAll('li'));
        
        if (items.length === 0 || items[0].innerText === "パーツを選択してください") {
            alert("構成が空です。");
            return;
        }

        items.forEach(li => {
            // 見栄え良く整形
            const content = li.innerText.replace(/\n/g, " ");
            text += `・${content}\n`;
        });

        navigator.clipboard.writeText(text).then(() => {
            alert("構成リストをコピーしました！");
        });
    }

    updateSummary();
</script>

</body>
</html>
